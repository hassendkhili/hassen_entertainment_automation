  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # تعريف المجلدات الخاصة بالـ Assets
  assets:
    - assets/lottie/