name: hassen_entertainment_automation
description: "A new Flutter project for Hotel Automation."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  file_picker: ^8.0.0
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.5
  lottie: ^3.1.2
